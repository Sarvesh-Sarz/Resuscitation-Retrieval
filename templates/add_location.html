{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>Add Location</h2>
    <p class="subtitle">// register a new service area</p>
</div>
<form method="POST" style="max-width:420px;">
    <label>Area / Locality</label>
    <input type="text" name="area" placeholder="e.g. Anna Nagar" required>
    <label>City</label>
    <input type="text" name="city" placeholder="e.g. Chennai" required>
    <label>Pincode</label>
    <input type="text" name="pincode" placeholder="6-digit pincode" maxlength="6" required>
    <button type="submit">Add Location</button>
</form>
{% endblock %}

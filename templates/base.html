<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Response System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
    <a href="/" class="nav-brand"> ERS</a>
    <a href="/add_location"> Location</a>
    <a href="/add_hospital"> Hospital</a>
    <a href="/add_ambulance"> Ambulance</a>
    <a href="/add_driver"> Driver</a>
    <a href="/register" class="nav-emergency"> Register Call</a>
    <a href="/dispatches"> Dispatches</a>
    <a href="/history"> History</a>
</nav>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

</body>
</html>

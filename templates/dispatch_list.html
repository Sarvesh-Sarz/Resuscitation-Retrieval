{% extends "base.html" %}

{% block content %}
<h2>Dispatch Records</h2>

<table border="1" width="100%">
    <tr>
        <th>Dispatch ID</th>
        <th>Patient</th>
        <th>Ambulance</th>
        <th>Driver</th>
        <th>Hospital</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row.dispatch_id }}</td>
        <td>{{ row.name }}</td>
        <td>{{ row.vehicle_number }}</td>
        <td>{{ row.driver_name }}</td>
        <td>{{ row.hospital_name }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}

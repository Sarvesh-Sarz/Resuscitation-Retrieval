{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>Add Driver</h2>
    <p class="subtitle">// license number must be unique</p>
</div>
<form method="POST" style="max-width:420px;">
    <label>Full Name</label>
    <input type="text" name="name" placeholder="driver's full name" required>
    <label>Phone Number</label>
    <input type="text" name="phone" placeholder="10-digit number" maxlength="10" required>
    <label>License Number</label>
    <input type="text" name="license" placeholder="e.g. TN0120230012345" required>
    <button type="submit">Add Driver</button>
</form>
{% endblock %}

{% extends "base.html" %}
{% block content %}

<h2>🆘 Register Emergency Call</h2>
<p class="subtitle">Fill in all details. An available ambulance will be auto-assigned.</p>

<form method="POST">

    <label>Emergency Type</label>
    <input type="text" name="emergency_type" placeholder="e.g. Cardiac Arrest, Road Accident" required>

    <label>Location</label>
    <select name="location_id" required>
        <option value="" disabled selected>— Select a location —</option>
        {% for loc in locations %}
        <option value="{{ loc.location_id }}">{{ loc.area }} — {{ loc.city }} ({{ loc.pincode }})</option>
        {% endfor %}
    </select>

    <label>Patient Name</label>
    <input type="text" name="name" placeholder="Full name" required>

    <label>Age</label>
    <input type="number" name="age" min="1" max="119" placeholder="e.g. 45" required>

    <label>Gender</label>
    <div class="radio-group">
        <label><input type="radio" name="gender" value="Male" required> Male</label>
        <label><input type="radio" name="gender" value="Female"> Female</label>
        <label><input type="radio" name="gender" value="Other"> Other</label>
    </div>

    <label>Contact Number</label>
    <input type="text" name="contact" placeholder="10-digit mobile number" maxlength="10" required>

    <button class="btn-danger" type="submit">🚑 Register & Dispatch Ambulance</button>

</form>

{% endblock %}

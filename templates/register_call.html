{% extends "base.html" %}
{% block content %}

<div class="page-header">
    <h2>Register Emergency Call</h2>
    <p class="subtitle">// all fields required — ambulance auto-assigned on submit</p>
</div>

<form method="POST" style="max-width:560px;">

    <label>Emergency Type</label>
    <input type="text" name="emergency_type"
           placeholder="e.g. Cardiac Arrest, Road Accident" required>

    <label>Location</label>
    <select name="location_id" required>
        <option value="" disabled selected>-- select location --</option>
        {% for loc in locations %}
        <option value="{{ loc.location_id }}">{{ loc.area }} / {{ loc.city }} / {{ loc.pincode }}</option>
        {% endfor %}
    </select>

    <label style="margin-top:28px;padding-top:16px;border-top:1px solid var(--border);">
        Patient Name
    </label>
    <input type="text" name="name" placeholder="full name" required>

    <label>Age</label>
    <input type="number" name="age" min="1" max="119" placeholder="—" required>

    <label>Gender</label>
    <div class="radio-group">
        <label><input type="radio" name="gender" value="Male" required> Male</label>
        <label><input type="radio" name="gender" value="Female"> Female</label>
        <label><input type="radio" name="gender" value="Other"> Other</label>
    </div>

    <label>Contact Number</label>
    <input type="text" name="contact" placeholder="10-digit number" maxlength="10" required>

    <button type="submit" class="btn-danger" style="margin-top:28px;">
        !! REGISTER &amp; DISPATCH AMBULANCE
    </button>

</form>

{% endblock %}
